include-file = __STACKI3_HOME__/.config/polybar/colors-generated.ini

;==========================================================
; Polybar actual para la sesion i3 + tema space-ops/oceano.
; Layout activo:
;   - izquierda: workspaces
;   - centro: reloj + fecha
;   - derecha: RAM, CPU, volumen y apagado
;
; Notas rapidas:
;   - Para mover un modulo entre zonas usa modules-left / modules-center / modules-right.
;   - fixed-center = true ayuda a que el bloque central quede realmente centrado.
;   - format-padding ajusta respiracion interna del modulo sin tocar fuentes.
;   - label-*-padding ajusta aire horizontal de labels, util para alinear mejor a izquierda/derecha.
;==========================================================

; Paleta de colores global.
; Cambia estos valores para afectar el look general de toda la barra.
[colors]
background = #000000
background-alt = #050711
elevated = #0b1020
foreground = #b8cdfe
primary = ${generated.primary}
primary-hover = ${generated.alert}
secondary = ${generated.secondary}
alert = ${generated.alert}
disabled = #444b6f
white = #ffffff

; Barra principal.
; Aqui se define geometria, fuente, zonas izquierda/centro/derecha y comportamiento general.
[bar/example]
width = 100%
height = 24pt
offset-x = 0
offset-y = 0
radius = 0.0
fixed-center = true


; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 0

separator =
separator-foreground = ${colors.disabled}


; Fuente principal de Polybar.
; Texto normal en Berkeley/IBM; Nerd Fonts solo para glifos si algun modulo las necesita.
font-0 = Berkeley Mono:size=11;3
font-1 = IBM Plex Mono:size=11;3
font-2 = MesloLGS Nerd Font Mono:size=12;2
font-3 = FiraCode Nerd Font Mono:size=12;2

modules-left = xworkspaces
modules-center = date
modules-right = ram cpu volume power

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

; Workspaces de i3.
; Si quieres un look mas pegado a la izquierda, baja label-*-padding.
; Si quieres mas separacion visual, subelo sin tocar la fuente.
[module/xworkspaces]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = | %name% |
label-focused-background = ${colors.background}
label-focused-foreground = ${colors.secondary}
label-focused-overline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-background = ${colors.background}
label-unfocused-padding = 1

label-visible = %name%
label-visible-background = ${colors.background}
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1

label-urgent = !%name%!
label-urgent-background = ${colors.background}
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1

; RAM.
; Modulo externo para mantener formato compacto y control total del texto mostrado.
[module/ram]
type = custom/script
exec = __STACKI3_HOME__/.config/polybar/scripts/ram_status.sh
interval = 3
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 1
label = %output%
click-left = __STACKI3_HOME__/.local/bin/space menu panels

[module/cpu]
type = custom/script
exec = __STACKI3_HOME__/.config/polybar/scripts/cpu_status.sh
interval = 2
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 1
label = %output%
click-left = __STACKI3_HOME__/.local/bin/space menu panels

[module/volume]
type = custom/script
exec = __STACKI3_HOME__/.config/polybar/scripts/volume_status.sh
interval = 1
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 1
label = %output%
click-left = __STACKI3_HOME__/.local/bin/space menu audio
click-right = __STACKI3_HOME__/.config/i3/volume_notify.sh mute
scroll-up = __STACKI3_HOME__/.config/i3/volume_notify.sh up
scroll-down = __STACKI3_HOME__/.config/i3/volume_notify.sh down

; Reloj + fecha centrados.
; Se deja todo en una sola linea para que el centro visual sea estable.
; Variantes utiles:
;   - centro real: usar modules-center = date y fixed-center = true
;   - alineado a izquierda/derecha: mover "date" a modules-left o modules-right
;   - mas aire lateral: subir format-padding
[module/date]
type = custom/script
exec = __STACKI3_HOME__/.config/polybar/scripts/date_updates_status.sh
interval = 60
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 1
label = %output%

; Boton de energía usando el diálogo nativo de Cinnamon.
; Abre la mini ventana centrada con apagar / reiniciar / cerrar sesión.
[module/power]
type = custom/text
format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 1
label = | PWR
click-left = __STACKI3_HOME__/.config/i3/power_menu.sh
click-right = __STACKI3_HOME__/.config/i3/lock.sh


; Ajustes generales de Polybar.
; Controlan comportamiento global como recarga al cambiar pantallas.
[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
