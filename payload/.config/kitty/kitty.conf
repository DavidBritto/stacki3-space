# STACKI3-Space canonical terminal profile (kitty).
include theme-generated.conf

# Body text. Berkeley Mono is used automatically when installed (fontconfig alias).
font_family      IBM Plex Mono
bold_font        IBM Plex Mono Bold
italic_font      IBM Plex Mono Italic
bold_italic_font IBM Plex Mono Bold Italic
font_size        11.0

# Nerd Font / Powerline private-use glyphs (Rofi deskmenu, Oh My Posh, etc.)
symbol_map U+E000-U+FFFF MesloLGS Nerd Font Mono
symbol_map U+F0000-U+FFFFF MesloLGS Nerd Font Mono

term                  xterm-kitty
shell                 .
scrollback_lines      10000
window_padding_width  4
confirm_os_window_close 0
enable_audio_bell     no
remember_window_size  yes
hide_window_decorations no

cursor_shape          block
cursor_blink_interval 0

env COLORTERM=truecolor
