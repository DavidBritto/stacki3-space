# ============================================================
#  TMUX CONFIG — STACKI3-Space Deep Space Theme
#  Paleta: azul profundo, amarillo oro, blanco brillante
# ============================================================

# --- General ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#W | tmux"
set -sg escape-time 10
set -g focus-events on
set -s set-clipboard on

# --- Mouse ---
set -g mouse on

# --- Prefix: Ctrl+t ---
# (Ctrl+Space es interceptado por GTK/GNOME Terminal antes de llegar a tmux)
unbind C-b
unbind C-Space
set -g prefix C-t
bind C-t send-prefix

# --- Recarga de config ---
bind r source-file ~/.tmux.conf \; display "Config recargada"

# --- Cerrar ventana actual (prefix + x) ---
bind x confirm-before -p "Cerrar ventana '#W'? (y/n)" kill-window

# --- Cerrar sesión (prefix + Q) ---
bind Q confirm-before -p "Cerrar sesión '#S'? (y/n)" kill-session

# --- Cambio directo de ventana (Alt+número, sin prefix) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Siguiente / anterior ventana (Alt+flechas, sin prefix) ---
bind -n M-Right next-window
bind -n M-Left  previous-window

# --- Click del medio sobre una ventana en la barra = cerrarla ---
bind -n MouseDown2Status kill-window -t "="

# --- Splits intuitivos (mantiene el directorio actual) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navegación entre panes (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Redimensionar panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Modo vi en copy mode ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "~/.local/bin/tmux-copy"
bind -T copy-mode-vi Escape send -X cancel
bind y run-shell "tmux capture-pane -pS - | ~/.local/bin/tmux-copy"

# ============================================================
#  TEMA:    Space-famdom — Paleta Drawbridge
#  #000000  BG_MAIN      - Deep Space (fondo más oscuro)
#  #050711  BG_SECONDARY - Dark Blue (fondos elevados)
#  #0b1020  BG_ELEVATED  - Medium Blue (elementos destacados)
#  #4961da  ACCENT       - Electric Blue (activo, selecciones)
#  #5b72ff  ACCENT_HOVER - Bright Blue (hover)
#  #67c9e4  CYAN         - Turquoise (links, éxito)
#  #67c9e4  CYAN_LIGHT   - Light Cyan (highlights)
#  #b8cdfe  TEXT_MAIN    - Soft Blue (texto general)
#  #444b6f  TEXT_DIM     - Muted Blue (texto secundario)
#  #ffffff  WHITE        - Texto en selecciones
# ============================================================

# Colores base de la barra de estado
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Fondo y texto general de la status bar
set -g status-style "bg=#000000,fg=#b8cdfe"

# --- Segmento IZQUIERDO: sesión ---
set -g status-left-length 60
set -g status-left "#[bg=#{?client_prefix,#67c9e4,#7c5cff},fg=#000000,bold] #{?client_prefix,PREFIX, sesions} #S #[bg=#0b1020,fg=#{?pane_in_mode,#67c9e4,#7c5cff}]#[bg=#0b1020,fg=#b8cdfe]#{?pane_in_mode, COPY,} "

# --- Segmento DERECHO: red / host / hora ---
set -g status-right-length 120
set -g status-right "#[bg=#0b1020,fg=#b8cdfe] #(~/.local/bin/tmux-net-health) #[bg=#0b1020,fg=#444b6f]| #[fg=#b8cdfe]#H #[bg=#4961da,fg=#000000,bold] %H:%M "


# --- Ventanas INACTIVAS ---
setw -g window-status-format "#[bg=#050711,fg=#444b6f] #I #W "
setw -g window-status-style "bg=#050711,fg=#444b6f"

# --- Ventana ACTIVA ---
setw -g window-status-current-format "#[bg=#0b1020,fg=#7c5cff,bold] #I #[fg=#b8cdfe,bold]#W "
setw -g window-status-current-style "bg=#0b1020,fg=#b8cdfe,bold"

# --- Separador entre ventanas ---
setw -g window-status-separator ""

# --- Bordes de panes ---
set -g pane-border-style "fg=#0b1020"
set -g pane-active-border-style "fg=#4961da"

# --- Mensajes / línea de comando ---
set -g message-style "bg=#4961da,fg=#000000,bold"
set -g message-command-style "bg=#0b1020,fg=#b8cdfe"

# --- Copy mode highlight ---
setw -g mode-style "bg=#4961da,fg=#000000"

# --- Indicador de actividad en ventanas ---
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#67c9e4,bold"

# ============================================================
#  ATAJO DE AYUDA — prefix + F1
#  Abre/cierra cheatsheet en un pane lateral (toggle)
# ============================================================
bind -n F1 run-shell '\
  if tmux select-window -t ":HELP" 2>/dev/null; then \
    tmux kill-window -t ":HELP"; \
  else \
    tmux new-window -n "HELP" "~/.local/bin/shortcuts-help tmux"; \
  fi'

# ============================================================
#  ATAJOS ÚTILES
# ============================================================
# Popup nativo para cambiar rápido entre sesiones/ventanas/panes
bind Space choose-tree -Zw
# Diagnóstico rápido de red estilo SRE/devops
bind N display-popup -E -w 80% -h 80% "~/.local/bin/tmux-net-debug"

# ============================================================
#  TPM + PLUGINS
# ============================================================
# Clipboard del sistema y soporte extra al copy-mode
set -g @plugin 'tmux-plugins/tmux-yank'

# Guardar/restaurar sesiones y layouts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Inicializa TPM al final del archivo
run '~/.tmux/plugins/tpm/tpm'
