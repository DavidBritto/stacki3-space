name: Build APT package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n install.sh
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find scripts payload -type f -name '*.sh' | sort)
          bash -n bin/stacki3-space

      - name: Python syntax
        run: |
          python3 -m py_compile \
            payload/.config/polybar/scripts/spotify_tui.py \
            payload/.config/i3/spotify_workspace_name.py

      - name: Unit tests
        run: python3 -m unittest discover -s tests

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils debhelper dpkg-dev gnupg

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect package
        run: |
          mkdir -p dist/deb
          cp ../stacki3-space_*_all.deb dist/deb/
          dpkg-deb --info dist/deb/*.deb

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: stacki3-space-deb
          path: dist/deb/*.deb

      - name: Attach package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/deb/*.deb

      - name: Build APT repository
        shell: bash
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          repo="dist/apt-repo"
          suite="stable"
          component="main"
          arch="amd64"
          package_dir="$repo/pool/main/s/stacki3-space"
          binary_dir="$repo/dists/$suite/$component/binary-$arch"

          mkdir -p "$package_dir" "$binary_dir"
          cp dist/deb/*.deb "$package_dir/"

          cd "$repo"
          dpkg-scanpackages pool > "dists/$suite/$component/binary-$arch/Packages"
          gzip -9fk "dists/$suite/$component/binary-$arch/Packages"
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="STACKI3-Space" \
            -o APT::FTPArchive::Release::Label="STACKI3-Space" \
            -o APT::FTPArchive::Release::Suite="$suite" \
            -o APT::FTPArchive::Release::Codename="$suite" \
            -o APT::FTPArchive::Release::Architectures="$arch all" \
            -o APT::FTPArchive::Release::Components="$component" \
            release "dists/$suite" > "dists/$suite/Release"

          if [ -n "$APT_GPG_PRIVATE_KEY" ] && [ -n "$APT_GPG_KEY_ID" ]; then
            export GNUPGHOME="$RUNNER_TEMP/stacki3-space-gnupg"
            mkdir -p "$GNUPGHOME"
            chmod 700 "$GNUPGHOME"
            printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --local-user "$APT_GPG_KEY_ID" --clearsign \
              --output "dists/$suite/InRelease" "dists/$suite/Release"
            gpg --batch --yes --local-user "$APT_GPG_KEY_ID" --detach-sign \
              --output "dists/$suite/Release.gpg" "dists/$suite/Release"
            gpg --batch --yes --armor --export "$APT_GPG_KEY_ID" > stacki3-space-archive-keyring.asc
          else
            echo "APT signing skipped; configure APT_GPG_PRIVATE_KEY and APT_GPG_KEY_ID to publish a signed repo."
          fi

      - name: Add landing page to Pages artifact
        run: |
          cp -a site/. dist/apt-repo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apt-repo

  deploy-pages:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy APT repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
